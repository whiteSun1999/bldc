name: Compile VESC Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-arm-none-eabi

      - name: Compile
        run: |
          make HW_SOURCE=make HW_SOURCE=75_100

            - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VESC-Firmware-Binary
          path: build/*.bin

